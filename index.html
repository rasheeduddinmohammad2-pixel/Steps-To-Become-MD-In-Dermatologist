<!DOCTYPE html>
<html>
<head>
    <title>Steps to Become Dermatologist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Trebuchet MS', sans-serif;
            background: url('https://images.unsplash.com/photo-1516542076529-1ea3854896f2') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #f5d98b;
            position: relative;
        }

        /* Dark golden overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 10, 0, 0.75);
            backdrop-filter: blur(3px);
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            padding: 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255,215,0,0.9);
        }

        h2 {
            font-weight: normal;
            margin-bottom: 50px;
            font-size: 22px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .btn {
            background: #f5d98b;
            color: #2c2c2c;
            padding: 25px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #ffe6a7;
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 14px;
            color: #f5d98b;
            z-index: 1;
        }

        @media(max-width: 768px){
            h1 { font-size: 32px; }
        }
    </style>
</head>

<body>

<div class="content">
    <h1>✨ Steps to Become a Dermatologist 👩‍⚕️</h1>
    <h2>Where Science Meets Skin</h2>

    <div class="buttons">
        <div class="btn">Motivation Videos</div>
        <div class="btn">Physics</div>
        <div class="btn">Chemistry</div>
        <div class="btn">Mathematics</div>
        <div class="btn">Botany</div>
        <div class="btn">Zoology</div>
        <div class="btn">Mind Games</div>
        <div class="btn">NEET Strategy</div>
    </div>
</div>

<footer>
© 2026 | Created by Amina Fatima
</footer>

</body>
</html>
