<!DOCTYPE html>
<html>
<head>
    <title>Steps to Become Dermatologist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1588776814546-ec7e1b64c0f0') no-repeat center center/cover;
            position: relative;
            color: white;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 0 0 20px rgba(241,196,15,0.8);
        }

        h2 {
            font-weight: normal;
            margin-bottom: 60px;
            font-size: 22px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .card-button {
            background: rgba(255, 215, 0, 0.9);
            color: #2c3e50;
            padding: 25px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .card-button:hover {
            transform: scale(1.05);
            background: #f1c40f;
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #f1c40f;
        }

        @media(max-width: 768px) {
            h1 {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Steps to Become a Dermatologist 👩‍⚕️</h1>
    <h2>Where Science Meets Skin</h2>

    <div class="button-container">
        <div class="card-button">Motivation & Career Guidance</div>
        <div class="card-button">Physics Preparation</div>
        <div class="card-button">Chemistry Preparation</div>
        <div class="card-button">Mathematics Practice</div>
        <div class="card-button">Botany Preparation</div>
        <div class="card-button">Zoology Preparation</div>
        <div class="card-button">Mind Development</div>
        <div class="card-button">NEET Strategy & Roadmap</div>
    </div>
</div>

<footer>
    © 2026 | Created by Amina Fatima | Future Dermatologist ✨
</footer>

</body>
</html>
